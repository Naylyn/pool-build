  <rect x="20" y="13" width="6" height="1.5" rx="0.75" fill="#bae6fd"/>
  <!-- swimmer -->
  <circle cx="11" cy="13" r="2.5" fill="#fbbf24"/>
  <path d="M11 15.5 Q8 17 6 16" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M11 15.5 Q14 17 16 16" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round"/>
