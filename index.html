<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Build Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0c4a6e 0%, #075985 40%, #0ea5e9 100%);
      min-height: 100vh;
    }

    /* ── Stage pill ── */
    .stage-pill {
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .stage-pill:hover   { border-color: #38bdf8; background: rgba(56,189,248,.15); }
    .stage-pill.active  { border-color: #0ea5e9; background: rgba(14,165,233,.25); }
    .stage-pill.done    { border-left: 3px solid #22c55e; }
    .stage-pill.pending { border-left: 3px solid #64748b; }

    /* ── Carousel ── */
    .carousel-track {
      display: flex;
      transition: transform 0.4s cubic-bezier(.25,.8,.25,1);
      will-change: transform;
    }
    .carousel-slide { flex: 0 0 100%; }
    .carousel-img {
      width: 100%; height: 100%;
      object-fit: cover;
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    .carousel-img:hover { transform: scale(1.02); }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(14,165,233,.4);
      cursor: zoom-out;
    }

    /* ── Progress bar ── */
    .progress-fill {
      background: linear-gradient(90deg, #22c55e, #0ea5e9);
      transition: width 0.6s ease;
    }

    /* ── No-image placeholder ── */
    .no-img-placeholder {
      background: linear-gradient(135deg, #0c4a6e, #075985);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%;
      color: #7dd3fc;
    }

    /* ── Scrollbar ── */
    .stage-list::-webkit-scrollbar { width: 6px; }
    .stage-list::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
    .stage-list::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 3px; }

    /* ── Dot indicator ── */
    .dot { transition: all 0.2s ease; cursor: pointer; }
    .dot.active { background: #38bdf8 !important; transform: scale(1.3); }

    /* ── Water ripple animation ── */
    @keyframes ripple {
      0%   { transform: scale(1);   opacity:.6; }
      100% { transform: scale(2.5); opacity:0; }
    }
    .ripple-circle { animation: ripple 2.5s ease-out infinite; }
    .ripple-circle:nth-child(2) { animation-delay:.8s; }
    .ripple-circle:nth-child(3) { animation-delay:1.6s; }
  </style>
</head>
<body class="font-sans text-white select-none">

<!-- ════════════ LIGHTBOX ════════════ -->
<div id="lightbox" onclick="closeLightbox()">
  <button onclick="closeLightbox(event)"
    class="absolute top-4 right-4 z-10 w-10 h-10 rounded-full bg-white/10 hover:bg-white/30
           flex items-center justify-center text-2xl font-bold transition">×</button>
  <img id="lightbox-img" src="" alt="" onclick="closeLightbox(event)" />
</div>

<!-- ════════════ HEADER ════════════ -->
<header class="relative overflow-hidden py-10 px-6 text-center">
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
    <div class="ripple-circle absolute w-64 h-64 rounded-full border-2 border-sky-400"></div>
    <div class="ripple-circle absolute w-64 h-64 rounded-full border-2 border-sky-400"></div>
    <div class="ripple-circle absolute w-64 h-64 rounded-full border-2 border-sky-400"></div>
  </div>

  <div class="relative z-10 inline-flex items-center justify-center w-20 h-20 rounded-full
              bg-white/10 border-2 border-sky-400 mb-4 text-4xl">🏊</div>

  <h1 id="project-title"
      class="relative z-10 text-4xl md:text-5xl font-black tracking-wide drop-shadow-lg">
    Pool Build Progress
  </h1>
  <p id="project-subtitle" class="relative z-10 mt-2 text-sky-200 text-lg"></p>

  <div class="relative z-10 mt-6 max-w-md mx-auto">
    <div class="flex justify-between text-sm text-sky-200 mb-1">
      <span>Overall Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="h-3 bg-white/10 rounded-full overflow-hidden">
      <div id="progress-bar" class="progress-fill h-full rounded-full" style="width:0%"></div>
    </div>
    <p id="progress-label" class="text-sky-300 text-sm mt-1">Loading…</p>
  </div>
</header>

<!-- ════════════ MAIN ════════════ -->
<main class="max-w-7xl mx-auto px-4 pb-12 flex flex-col lg:flex-row gap-6">

  <!-- LEFT: stage list -->
  <aside class="lg:w-72 xl:w-80 flex-shrink-0">
    <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-4 sticky top-4">
      <h2 class="text-sky-200 text-xs font-semibold uppercase tracking-widest mb-3 px-1">
        Build Stages
      </h2>
      <!-- 
        ORDER NOTE: stages are displayed in the same order they appear in pool_data.json.
        The id field is a stable unique key — reorder entries in the JSON to change display order.
        The number shown in the sidebar (1, 2, 3…) is always the array position, not the id.
      -->
      <div id="stage-list" class="stage-list overflow-y-auto max-h-[70vh] space-y-1 pr-1"></div>
    </div>
  </aside>

  <!-- RIGHT: detail + carousel -->
  <section class="flex-1 min-w-0">
    <div id="detail-panel" class="bg-white/10 backdrop-blur-sm rounded-2xl overflow-hidden">

      <!-- Stage header -->
      <div class="p-6 border-b border-white/10">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <!-- Shows array position (1-based), not the id field -->
              <span id="detail-num"
                    class="text-xs font-bold bg-sky-500 text-white px-2 py-0.5 rounded-full">
                01
              </span>
              <span id="detail-status" class="text-xs text-sky-300"></span>
            </div>
            <h2 id="detail-name" class="text-2xl md:text-3xl font-bold"></h2>
          </div>
          <div class="text-right">
            <div class="text-sky-300 text-xs uppercase tracking-widest">Date</div>
            <div id="detail-date" class="text-white font-semibold"></div>
          </div>
        </div>
        <p id="detail-desc" class="mt-3 text-sky-100 leading-relaxed"></p>
      </div>

      <!-- Carousel viewport -->
      <div class="relative" id="carousel-container">
        <div class="overflow-hidden" id="carousel-viewport" style="height:420px;">
          <div class="carousel-track h-full" id="carousel-track"></div>
        </div>

        <!-- Prev / Next -->
        <button id="btn-prev"
          class="absolute left-3 top-1/2 -translate-y-1/2 z-10
                 w-10 h-10 rounded-full bg-black/50 hover:bg-black/70
                 flex items-center justify-center text-xl transition
                 disabled:opacity-20 disabled:cursor-not-allowed">‹</button>
        <button id="btn-next"
          class="absolute right-3 top-1/2 -translate-y-1/2 z-10
                 w-10 h-10 rounded-full bg-black/50 hover:bg-black/70
                 flex items-center justify-center text-xl transition
                 disabled:opacity-20 disabled:cursor-not-allowed">›</button>

        <!-- Dots -->
        <div id="dots" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2"></div>

        <!-- Counter -->
        <div id="img-counter"
             class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded-full hidden">
        </div>
      </div>
    </div>

    <!-- Stage prev/next navigation -->
    <div class="flex justify-between mt-4">
      <button id="nav-prev"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20
               transition disabled:opacity-30 disabled:cursor-not-allowed text-sm">
        ← Previous Stage
      </button>
      <button id="nav-next"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-sky-500 hover:bg-sky-400
               transition disabled:opacity-30 disabled:cursor-not-allowed text-sm font-medium">
        Next Stage →
      </button>
    </div>
  </section>
</main>

<!-- ════════════ JAVASCRIPT ════════════ -->
<script>
/*
  KEY DESIGN DECISIONS
  ─────────────────────
  1. Display order = array order in pool_data.json
     The `id` field is a stable unique key for each stage (like a database PK).
     Stage numbers shown in the UI are always arrayIndex + 1, never the id.

  2. To reorder stages: move the JSON objects around in the array.
     No need to renumber ids — the UI recalculates positions automatically.

  3. To add a new stage in the middle: insert it at the desired position
     in the array with a new unique id. Existing ids never change.
*/

let stages = [];
let currentArrayIdx = 0;   // index into the stages array (display order)
let currentImgIdx   = 0;

// ── Load ──────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('pool_data.json');
    const data = await res.json();

    document.getElementById('project-title').textContent    = data.project.title    || 'Pool Build Progress';
    document.getElementById('project-subtitle').textContent = data.project.address  || '';

    // Validate: warn about duplicate ids in the console but don't crash
    const idsSeen = new Set();
    data.stages.forEach((s, i) => {
      if (idsSeen.has(s.id)) {
        console.warn(`Duplicate id ${s.id} found at array index ${i} ("${s.name}"). Each stage should have a unique id.`);
      }
      idsSeen.add(s.id);
    });

    stages = data.stages;
    init();
  } catch (err) {
    console.error('Failed to load pool_data.json:', err);
    document.getElementById('detail-name').textContent = '⚠ Could not load pool_data.json';
    document.getElementById('detail-desc').textContent =
      'Make sure pool_data.json is in the same folder as index.html and you are running a local web server (not opening the file directly).';
  }
}

// ── Init ──────────────────────────────────────────
function init() {
  buildSidebar();
  updateProgress();
  selectStage(0);

  document.getElementById('btn-prev').addEventListener('click', prevImage);
  document.getElementById('btn-next').addEventListener('click', nextImage);
  document.getElementById('nav-prev').addEventListener('click', () => selectStage(currentArrayIdx - 1));
  document.getElementById('nav-next').addEventListener('click', () => selectStage(currentArrayIdx + 1));
  document.addEventListener('keydown', onKey);
}

// ── Build sidebar ─────────────────────────────────
// Display number = arrayIdx + 1  (independent of s.id)
function buildSidebar() {
  const list = document.getElementById('stage-list');
  list.innerHTML = '';

  stages.forEach((s, arrayIdx) => {
    const done    = !!s.date;
    const hasImgs = s.images && s.images.length > 0;
    const display = arrayIdx + 1;                     // 1-based position in the list

    const pill = document.createElement('div');
    pill.className = `stage-pill rounded-xl p-3 ${done ? 'done' : 'pending'}`;
    pill.dataset.arrayIdx = arrayIdx;                  // store position for click handler
    pill.id = `pill-${arrayIdx}`;

    pill.innerHTML = `
      <div class="flex items-center gap-2">
        <span class="flex-shrink-0 w-6 h-6 rounded-full text-xs font-bold
                     flex items-center justify-center
                     ${done ? 'bg-green-500 text-white' : 'bg-slate-600 text-slate-300'}">
          ${display}
        </span>
        <span class="flex-1 text-sm leading-tight
                     ${s.style === 'bold-caps'
                       ? 'font-black uppercase tracking-wide text-sky-300'
                       : 'text-white'}">
          ${s.name}
        </span>
        ${hasImgs
          ? `<span class="flex-shrink-0 text-xs text-sky-400">📷${s.images.length}</span>`
          : ''}
      </div>
      ${done
        ? `<div class="text-xs text-green-400 mt-1 pl-8">${formatDate(s.date)}</div>`
        : ''}
    `;

    pill.addEventListener('click', () => selectStage(arrayIdx));
    list.appendChild(pill);
  });
}

// ── Select stage ──────────────────────────────────
function selectStage(arrayIdx) {
  if (arrayIdx < 0 || arrayIdx >= stages.length) return;

  // Deactivate old pill
  const oldPill = document.getElementById(`pill-${currentArrayIdx}`);
  if (oldPill) oldPill.classList.remove('active');

  // Pause any playing video before switching stage
  document.querySelectorAll('#carousel-track video').forEach(v => v.pause());

  currentArrayIdx = arrayIdx;
  currentImgIdx   = 0;
  const s       = stages[arrayIdx];
  const display = arrayIdx + 1;   // human-visible number

  // Activate new pill and scroll into view
  const pill = document.getElementById(`pill-${arrayIdx}`);
  if (pill) {
    pill.classList.add('active');
    pill.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Header — show array position as the stage number
  document.getElementById('detail-num').textContent = String(display).padStart(2, '0');

  const nameEl = document.getElementById('detail-name');
  nameEl.textContent = s.name;
  nameEl.className   = `text-2xl md:text-3xl ${
    s.style === 'bold-caps'
      ? 'font-black uppercase tracking-wide text-sky-300'
      : 'font-bold text-white'
  }`;

  const statusEl = document.getElementById('detail-status');
  if (s.date) {
    statusEl.textContent = '✅ Completed';
    statusEl.className   = 'text-xs text-green-400';
  } else {
    statusEl.textContent = '⏳ Upcoming';
    statusEl.className   = 'text-xs text-slate-400';
  }

  const dateEl = document.getElementById('detail-date');
  dateEl.textContent = s.date ? formatDate(s.date) : 'Not yet scheduled';
  dateEl.className   = s.date ? 'text-white font-semibold' : 'text-slate-400 italic';

  document.getElementById('detail-desc').textContent = s.description || '';

  buildCarousel(s.images || []);

  document.getElementById('nav-prev').disabled = arrayIdx === 0;
  document.getElementById('nav-next').disabled = arrayIdx === stages.length - 1;
}

// ── Build carousel ────────────────────────────────
// ── Media type detection ──────────────────────────
function isVideo(url) {
  return /\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url);
}

function buildCarousel(images) {
  const track   = document.getElementById('carousel-track');
  const dots    = document.getElementById('dots');
  const counter = document.getElementById('img-counter');

  // Pause any playing video from the previous slide
  document.querySelectorAll('#carousel-track video').forEach(v => v.pause());

  track.innerHTML = '';
  dots.innerHTML  = '';
  counter.textContent = '';
  counter.classList.add('hidden');

  if (!images || images.length === 0) {
    track.innerHTML = `
      <div class="carousel-slide">
        <div class="no-img-placeholder" style="height:420px;">
          <div class="text-6xl mb-4 opacity-40">🏊</div>
          <p class="text-sky-300 font-semibold">No photos yet for this stage</p>
          <p class="text-sky-500 text-sm mt-1">Check back as construction progresses</p>
        </div>
      </div>`;
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }

  images.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className    = 'carousel-slide';
    slide.style.height = '420px';

    if (isVideo(url)) {
      // ── Video slide ──
      const vid = document.createElement('video');
      vid.src         = url;
      vid.controls    = true;
      vid.preload     = 'metadata';
      vid.playsInline = true;
      vid.style.cssText =
        'width:100%;height:100%;object-fit:contain;background:#000;cursor:default;';
      // Clicking the video itself plays/pauses — don't open lightbox
      slide.appendChild(vid);
    } else {
      // ── Image slide ──
      const img = document.createElement('img');
      img.src       = url;
      img.alt       = `Stage media ${i + 1}`;
      img.className = 'carousel-img';
      img.onerror   = () => {
        img.src =
          `https://via.placeholder.com/800x420/0c4a6e/7dd3fc?text=Media+${i+1}+Not+Found`;
      };
      img.addEventListener('click', () => openLightbox(url));
      slide.appendChild(img);
    }

    track.appendChild(slide);

    // Dot — show 🎬 for video, ● for image
    const dot = document.createElement('div');
    dot.className = isVideo(url)
      ? 'dot text-xs cursor-pointer leading-none'
      : 'dot w-2 h-2 rounded-full bg-white/40';
    if (isVideo(url)) dot.textContent = '▶';
    dot.addEventListener('click', () => goToImage(i));
    dots.appendChild(dot);
  });

  goToImage(0);
  const multi = images.length > 1;
  document.getElementById('btn-prev').disabled = !multi;
  document.getElementById('btn-next').disabled = !multi;
}

// ── Carousel movement ─────────────────────────────
function goToImage(idx) {
  const images = stages[currentArrayIdx].images;
  if (!images || images.length === 0) return;

  // Pause any currently playing video before moving away
  document.querySelectorAll('#carousel-track video').forEach(v => v.pause());

  currentImgIdx = (idx + images.length) % images.length;

  document.getElementById('carousel-track').style.transform =
    `translateX(-${currentImgIdx * 100}%)`;

  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentImgIdx));

  const counter = document.getElementById('img-counter');
  if (images.length > 1) {
    const type = isVideo(images[currentImgIdx]) ? '🎬' : '📷';
    counter.textContent = `${type} ${currentImgIdx + 1} / ${images.length}`;
    counter.classList.remove('hidden');
  } else {
    counter.classList.add('hidden');
  }
}

function prevImage() { goToImage(currentImgIdx - 1); }
function nextImage() { goToImage(currentImgIdx + 1); }

// ── Keyboard ──────────────────────────────────────
function onKey(e) {
  const lbOpen = document.getElementById('lightbox').classList.contains('open');
  if (e.key === 'Escape')      { closeLightbox(); return; }
  if (lbOpen) return;
  if (e.key === 'ArrowLeft')   prevImage();
  if (e.key === 'ArrowRight')  nextImage();
  if (e.key === 'ArrowUp')     selectStage(currentArrayIdx - 1);
  if (e.key === 'ArrowDown')   selectStage(currentArrayIdx + 1);
}

// ── Lightbox (images only — videos use native controls) ───
function openLightbox(src) {
  if (isVideo(src)) return;   // videos play inline, no lightbox needed
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Progress bar ──────────────────────────────────
function updateProgress() {
  const done  = stages.filter(s => s.date).length;
  const total = stages.length;
  const pct   = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width  = pct + '%';
  document.getElementById('progress-pct').textContent   = pct + '%';
  document.getElementById('progress-label').textContent =
    `${done} of ${total} stages completed`;
}

// ── Helpers ───────────────────────────────────────
function formatDate(d) {
  if (!d) return '';
  try {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US',
      { year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return d; }
}

// ── Boot ──────────────────────────────────────────
loadData();
</script>
</body>
</html>
