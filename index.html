<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Build Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --pool-blue: #0ea5e9;
      --pool-dark: #0c4a6e;
      --pool-mid:  #0369a1;
    }

    body {
      background: linear-gradient(135deg, #0c4a6e 0%, #075985 40%, #0ea5e9 100%);
      min-height: 100vh;
    }

    /* ── Stage pill ── */
    .stage-pill {
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .stage-pill:hover   { border-color: #38bdf8; background: rgba(56,189,248,.15); }
    .stage-pill.active  { border-color: #0ea5e9; background: rgba(14,165,233,.25); }
    .stage-pill.done    { border-left: 3px solid #22c55e; }
    .stage-pill.pending { border-left: 3px solid #64748b; }

    /* ── Carousel ── */
    .carousel-track {
      display: flex;
      transition: transform 0.4s cubic-bezier(.25,.8,.25,1);
    }
    .carousel-slide { flex: 0 0 100%; }

    .carousel-img {
      width: 100%; height: 100%;
      object-fit: cover;
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    .carousel-img:hover { transform: scale(1.02); }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(14,165,233,.4);
      cursor: zoom-out;
    }

    /* ── Progress bar ── */
    .progress-fill {
      background: linear-gradient(90deg, #22c55e, #0ea5e9);
      transition: width 0.6s ease;
    }

    /* ── No-image placeholder ── */
    .no-img-placeholder {
      background: linear-gradient(135deg, #0c4a6e, #075985);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%;
      color: #7dd3fc;
    }

    /* ── Scrollbar ── */
    .stage-list::-webkit-scrollbar { width: 6px; }
    .stage-list::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
    .stage-list::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 3px; }

    /* ── Dot indicator ── */
    .dot { transition: all 0.2s ease; }
    .dot.active { background: #38bdf8; transform: scale(1.3); }

    /* Water ripple animation on header */
    @keyframes ripple {
      0%   { transform: scale(1);   opacity:.6; }
      100% { transform: scale(2.5); opacity:0; }
    }
    .ripple-circle {
      animation: ripple 2.5s ease-out infinite;
    }
    .ripple-circle:nth-child(2) { animation-delay:.8s; }
    .ripple-circle:nth-child(3) { animation-delay:1.6s; }
  </style>
</head>
<body class="font-sans text-white select-none">

<!-- ════════════════════ LIGHTBOX ════════════════════ -->
<div id="lightbox" onclick="closeLightbox()">
  <button onclick="closeLightbox(event)"
    class="absolute top-4 right-4 z-10 w-10 h-10 rounded-full bg-white/10 hover:bg-white/30
           flex items-center justify-center text-2xl font-bold transition">×</button>
  <img id="lightbox-img" src="" alt="" onclick="closeLightbox(event)" />
</div>

<!-- ════════════════════ HEADER ════════════════════ -->
<header class="relative overflow-hidden py-10 px-6 text-center">
  <!-- animated water rings -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
    <div class="ripple-circle absolute w-64 h-64 rounded-full border-2 border-sky-400"></div>
    <div class="ripple-circle absolute w-64 h-64 rounded-full border-2 border-sky-400"></div>
    <div class="ripple-circle absolute w-64 h-64 rounded-full border-2 border-sky-400"></div>
  </div>

  <!-- pool icon -->
  <div class="relative z-10 inline-flex items-center justify-center w-20 h-20 rounded-full
              bg-white/10 border-2 border-sky-400 mb-4 text-4xl">🏊</div>

  <h1 id="project-title"
      class="relative z-10 text-4xl md:text-5xl font-black tracking-wide drop-shadow-lg">
    Pool Build Progress
  </h1>
  <p id="project-subtitle" class="relative z-10 mt-2 text-sky-200 text-lg">Our Pool Journey</p>

  <!-- overall progress bar -->
  <div class="relative z-10 mt-6 max-w-md mx-auto">
    <div class="flex justify-between text-sm text-sky-200 mb-1">
      <span>Overall Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="h-3 bg-white/10 rounded-full overflow-hidden">
      <div id="progress-bar" class="progress-fill h-full rounded-full" style="width:0%"></div>
    </div>
    <p id="progress-label" class="text-sky-300 text-sm mt-1">Loading…</p>
  </div>
</header>

<!-- ════════════════════ MAIN LAYOUT ════════════════════ -->
<main class="max-w-7xl mx-auto px-4 pb-12 flex flex-col lg:flex-row gap-6">

  <!-- ── LEFT PANEL: stage list ── -->
  <aside class="lg:w-72 xl:w-80 flex-shrink-0">
    <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-4 sticky top-4">
      <h2 class="text-sky-200 text-xs font-semibold uppercase tracking-widest mb-3 px-1">
        Build Stages
      </h2>
      <div id="stage-list" class="stage-list overflow-y-auto max-h-[70vh] space-y-1 pr-1"></div>
    </div>
  </aside>

  <!-- ── RIGHT PANEL: detail + carousel ── -->
  <section class="flex-1 min-w-0">
    <div id="detail-panel" class="bg-white/10 backdrop-blur-sm rounded-2xl overflow-hidden">

      <!-- stage header -->
      <div class="p-6 border-b border-white/10">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span id="detail-num"
                    class="text-xs font-bold bg-sky-500 text-white px-2 py-0.5 rounded-full">
                01
              </span>
              <span id="detail-status" class="text-xs text-sky-300"></span>
            </div>
            <h2 id="detail-name" class="text-2xl md:text-3xl font-bold"></h2>
          </div>
          <div id="detail-date-wrap" class="text-right">
            <div class="text-sky-300 text-xs uppercase tracking-widest">Date</div>
            <div id="detail-date" class="text-white font-semibold"></div>
          </div>
        </div>
        <p id="detail-desc" class="mt-3 text-sky-100 leading-relaxed"></p>
      </div>

      <!-- carousel -->
      <div class="relative" id="carousel-container">

        <!-- viewport -->
        <div class="overflow-hidden" id="carousel-viewport" style="height: 420px;">
          <div class="carousel-track h-full" id="carousel-track"></div>
        </div>

        <!-- prev / next buttons -->
        <button id="btn-prev"
          class="absolute left-3 top-1/2 -translate-y-1/2 z-10
                 w-10 h-10 rounded-full bg-black/50 hover:bg-black/70
                 flex items-center justify-center text-xl transition
                 disabled:opacity-20 disabled:cursor-not-allowed">‹</button>
        <button id="btn-next"
          class="absolute right-3 top-1/2 -translate-y-1/2 z-10
                 w-10 h-10 rounded-full bg-black/50 hover:bg-black/70
                 flex items-center justify-center text-xl transition
                 disabled:opacity-20 disabled:cursor-not-allowed">›</button>

        <!-- dot indicators -->
        <div id="dots" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2"></div>

        <!-- image counter -->
        <div id="img-counter"
             class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded-full">
        </div>
      </div>

    </div>

    <!-- nav buttons below detail panel -->
    <div class="flex justify-between mt-4">
      <button id="nav-prev"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20
               transition disabled:opacity-30 disabled:cursor-not-allowed text-sm">
        ← Previous Stage
      </button>
      <button id="nav-next"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-sky-500 hover:bg-sky-400
               transition disabled:opacity-30 disabled:cursor-not-allowed text-sm font-medium">
        Next Stage →
      </button>
    </div>
  </section>

</main>

<!-- ════════════════════ SCRIPT ════════════════════ -->
<script>
// ── State ──
let stages = [];
let currentStageIdx = 0;
let currentImgIdx   = 0;

// ── Load data ──
async function loadData() {
  try {
    const res = await fetch('pool_data.json');
    const data = await res.json();
    document.getElementById('project-title').textContent     = data.project.title;
    document.getElementById('project-subtitle').textContent  = data.project.address;
    stages = data.stages;
    init();
  } catch(e) {
    console.error('Failed to load pool_data.json:', e);
    document.getElementById('detail-name').textContent = '⚠ Could not load pool_data.json';
    document.getElementById('detail-desc').textContent =
      'Make sure pool_data.json is in the same folder as index.html.';
  }
}

// ── Init ──
function init() {
  buildSideList();
  updateProgress();
  selectStage(0);
  document.getElementById('btn-prev').addEventListener('click', prevImage);
  document.getElementById('btn-next').addEventListener('click', nextImage);
  document.getElementById('nav-prev').addEventListener('click', () => selectStage(currentStageIdx - 1));
  document.getElementById('nav-next').addEventListener('click', () => selectStage(currentStageIdx + 1));
  document.addEventListener('keydown', onKey);
}

// ── Build sidebar ──
function buildSideList() {
  const list = document.getElementById('stage-list');
  list.innerHTML = '';
  stages.forEach((s, i) => {
    const done    = !!s.date;
    const hasImgs = s.images && s.images.length > 0;
    const pill    = document.createElement('div');
    pill.className = `stage-pill rounded-xl p-3 ${done ? 'done' : 'pending'}`;
    pill.id = `pill-${i}`;
    pill.innerHTML = `
      <div class="flex items-center gap-2">
        <span class="flex-shrink-0 w-6 h-6 rounded-full text-xs font-bold flex items-center justify-center
                     ${done ? 'bg-green-500 text-white' : 'bg-slate-600 text-slate-300'}">
          ${i + 1}
        </span>
        <span class="flex-1 text-sm leading-tight
                     ${s.style === 'bold-caps' ? 'font-black uppercase tracking-wide text-sky-300' : 'text-white'}">
          ${s.name}
        </span>
        ${hasImgs ? `<span class="flex-shrink-0 text-xs text-sky-400">📷${s.images.length}</span>` : ''}
      </div>
      ${done ? `<div class="text-xs text-green-400 mt-1 pl-8">${formatDate(s.date)}</div>` : ''}
    `;
    pill.addEventListener('click', () => selectStage(i));
    list.appendChild(pill);
  });
}

// ── Select stage ──
function selectStage(idx) {
  if (idx < 0 || idx >= stages.length) return;
  // deactivate old pill
  const oldPill = document.getElementById(`pill-${currentStageIdx}`);
  if (oldPill) oldPill.classList.remove('active');

  currentStageIdx = idx;
  currentImgIdx   = 0;
  const s = stages[idx];

  // activate new pill
  const pill = document.getElementById(`pill-${idx}`);
  if (pill) {
    pill.classList.add('active');
    pill.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // update detail header
  document.getElementById('detail-num').textContent = String(idx + 1).padStart(2, '0');

  const nameEl = document.getElementById('detail-name');
  nameEl.textContent = s.name;
  nameEl.className   = `text-2xl md:text-3xl ${s.style === 'bold-caps' ? 'font-black uppercase tracking-wide text-sky-300' : 'font-bold text-white'}`;

  const statusEl = document.getElementById('detail-status');
  if (s.date) {
    statusEl.textContent  = '✅ Completed';
    statusEl.className    = 'text-xs text-green-400';
  } else {
    statusEl.textContent  = '⏳ Upcoming';
    statusEl.className    = 'text-xs text-slate-400';
  }

  const dateEl   = document.getElementById('detail-date');
  dateEl.textContent = s.date ? formatDate(s.date) : 'Not yet scheduled';
  dateEl.className   = s.date ? 'text-white font-semibold' : 'text-slate-400 italic';

  document.getElementById('detail-desc').textContent = s.description || '';

  buildCarousel(s.images || []);

  // nav buttons
  document.getElementById('nav-prev').disabled = idx === 0;
  document.getElementById('nav-next').disabled = idx === stages.length - 1;
}

// ── Build carousel ──
function buildCarousel(images) {
  const track   = document.getElementById('carousel-track');
  const dots    = document.getElementById('dots');
  const counter = document.getElementById('img-counter');
  track.innerHTML = '';
  dots.innerHTML  = '';

  if (!images || images.length === 0) {
    // no-photo placeholder
    track.innerHTML = `
      <div class="carousel-slide">
        <div class="no-img-placeholder" style="height:420px;">
          <div class="text-6xl mb-4 opacity-40">🏊</div>
          <p class="text-sky-300 font-semibold">No photos yet for this stage</p>
          <p class="text-sky-500 text-sm mt-1">Check back as construction progresses</p>
        </div>
      </div>`;
    counter.textContent = '';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }

  images.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide';
    slide.style.height = '420px';
    slide.innerHTML = `
      <img src="${url}" alt="Stage photo ${i+1}"
           class="carousel-img"
           onerror="this.src='https://via.placeholder.com/800x420/0c4a6e/7dd3fc?text=Image+Not+Found'"
           onclick="openLightbox('${url}')" />`;
    track.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = `dot w-2 h-2 rounded-full bg-white/40 cursor-pointer`;
    dot.addEventListener('click', () => goToImage(i));
    dots.appendChild(dot);
  });

  goToImage(0);
  document.getElementById('btn-prev').disabled = images.length <= 1;
  document.getElementById('btn-next').disabled = images.length <= 1;
}

// ── Carousel navigation ──
function goToImage(idx) {
  const images = stages[currentStageIdx].images;
  if (!images || images.length === 0) return;
  currentImgIdx = (idx + images.length) % images.length;

  document.getElementById('carousel-track').style.transform =
    `translateX(-${currentImgIdx * 100}%)`;

  // update dots
  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentImgIdx));

  // counter
  document.getElementById('img-counter').textContent =
    images.length > 1 ? `${currentImgIdx + 1} / ${images.length}` : '';

  document.getElementById('btn-prev').disabled = images.length <= 1;
  document.getElementById('btn-next').disabled = images.length <= 1;
}

function prevImage() { goToImage(currentImgIdx - 1); }
function nextImage() { goToImage(currentImgIdx + 1); }

// ── Keyboard nav ──
function onKey(e) {
  if (e.key === 'ArrowLeft')  {
    if (document.getElementById('lightbox').classList.contains('open')) return;
    prevImage();
  }
  if (e.key === 'ArrowRight') {
    if (document.getElementById('lightbox').classList.contains('open')) return;
    nextImage();
  }
  if (e.key === 'ArrowUp')   selectStage(currentStageIdx - 1);
  if (e.key === 'ArrowDown') selectStage(currentStageIdx + 1);
  if (e.key === 'Escape')    closeLightbox();
}

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Progress ──
function updateProgress() {
  const done  = stages.filter(s => s.date).length;
  const total = stages.length;
  const pct   = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-label').textContent =
    `${done} of ${total} stages completed`;
}

// ── Helpers ──
function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US',
      { year:'numeric', month:'long', day:'numeric' });
  } catch { return dateStr; }
}

// ── Boot ──
loadData();
</script>
</body>
</html>
